splat:
  id: mage
  display_name: "Mage: The Ascension"
  edition: "M20"
  version: "1.0"
  schema: schema.yaml
  resources: resources.yaml
  chargen: chargen.yaml
  templates_dir: templates/
  screens:
    character_sheet: null
    chargen_steps:
      - identity
      - attributes
      - abilities
      - spheres
      - backgrounds
      - merits_flaws
      - review
  # Tab configuration for the character sheet overlay
  # "categories: []" means the special Merits & Resources tab
  character_sheet:
    tabs:
      - name: "Attributes & Abilities"
        categories: [attributes, abilities]
      - name: "Spheres & Backgrounds"
        categories: [arete, spheres, backgrounds]
      - name: "Merits & Resources"
        categories: []
