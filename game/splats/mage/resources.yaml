      - { name: "Wounded", penalty: -2 }
      - { name: "Mauled", penalty: -2 }
      - { name: "Crippled", penalty: -5 }
      - { name: "Incapacitated", penalty: null }

resource_links:
  quintessence_wheel:
    pools: [quintessence, paradox]
    combined_max: 20
