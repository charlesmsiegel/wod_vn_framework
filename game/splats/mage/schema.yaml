# Schema revision. Bump this whenever you change traits or ranges so that
# characters saved under the old schema are migrated on load. See the Author
# Guide section "Save Migration" and wod_core/migrations.py.
version: "1.0"

trait_categories:
  attributes:
    display_name: "Attributes"
    groups:
      physical: [Strength, Dexterity, Stamina]
      social: [Charisma, Manipulation, Appearance]
      mental: [Perception, Intelligence, Wits]
    default: 1
    range: [1, 5]

  abilities:
    display_name: "Abilities"
    groups:
      talents:
        - Alertness
        - Art
        - Athletics
        - Awareness
        - Brawl
        - Empathy
        - Expression
        - Intimidation
        - Leadership
        - Streetwise
        - Subterfuge
      skills:
        - Crafts
        - Drive
        - Etiquette
        - Firearms
        - Martial Arts
        - Meditation
        - Melee
        - Research
        - Stealth
        - Survival
        - Technology
      knowledges:
        - Academics
        - Computer
        - Cosmology
        - Enigmas
        - Esoterica
        - Investigation
        - Law
        - Medicine
        - Occult
        - Politics
        - Science
    default: 0
    range: [0, 5]

  spheres:
    display_name: "Spheres"
    traits:
      - Correspondence
      - Entropy
      - Forces
      - Life
      - Matter
      - Mind
      - Prime
      - Spirit
      - Time
    default: 0
    range: [0, 5]

  arete:
    display_name: "Arete"
    traits: [Arete]
    default: 1
    range: [1, 10]

  backgrounds:
    display_name: "Backgrounds"
    traits:
      - Allies
      - Avatar
      - Contacts
      - Destiny
      - Dream
      - Familiar
      - Influence
      - Mentor
      - Node
      - Resources
      - Sanctum
      - Wonder
    default: 0
    range: [0, 5]

  # Resonance — the flavor a mage's magick leaves on reality (M20).
  # Every act of magick carries one of three Resonance types. Rated 0–5;
  # a beginning mage typically has a single dot. Gate on these like any
  # other trait, e.g. [Static >= 2] or pc.gate("Dynamic", ">=", 1).
  resonance:
    display_name: "Resonance"
    traits:
      - Dynamic
      - Entropic
      - Static
    default: 0
    range: [0, 5]

trait_constraints:
  - type: max_linked
    target_category: spheres
    limited_by: Arete
    rule: "No Sphere can exceed Arete rating"

# Optional paradigm/focus system. Each Tradition channels magick through its own
# paradigm-appropriate methods: a Virtual Adept casts through code, never prayer;
# a Celestial Chorister is the reverse. Authors gate choices with the `via`
# shorthand — "Pray over the ward" [via prayer] — or pc.can_use("prayer").
# Tradition keys match the ids/names in chargen.yaml (either form works).
paradigm:
  methods:
    prayer: "Prayer & Faith"
    ritual: "High Ritual Magick"
    code: "Cybernetics & Code"
    science: "Hypertech & Mad Science"
    blood: "Blood & Sympathetic Magic"
    herbalism: "Herbalism & Wortcunning"
    meditation: "Meditation & Inner Focus"
    martial_arts: "Martial Arts (Do)"
    art: "Art & Performance"
    dreaming: "Dreaming & Trance"
    spirit_speech: "Spirit-Speech & Shamanism"
    death_work: "Death-Work & Fate"
  traditions:
    akashic_brotherhood: [meditation, martial_arts]
    celestial_chorus: [prayer, art]
    cult_of_ecstasy: [art, dreaming]
    dreamspeakers: [spirit_speech, dreaming]
    euthanatos: [death_work, meditation]
    order_of_hermes: [ritual]
    sons_of_ether: [science]
    verbena: [blood, herbalism, ritual]
    virtual_adepts: [code, science]
